<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#c0c0c0" />
    <title>扫雷</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <div class="toolbar-row toolbar-row--diff">
          <label class="field-label field-label--grow">
            <span class="field-label__text">难度</span>
            <div class="select-wrap">
              <select id="difficulty" class="select" aria-label="难度">
                <option value="beginner">初级 · 9×9 · 10</option>
                <option value="intermediate">中级 · 16×16 · 40</option>
                <option value="expert">高级 · 16×30 · 99</option>
              </select>
            </div>
          </label>
          <div class="toolbar-actions">
            <button
              type="button"
              class="leaderboard-link leaderboard-link--music-on"
              id="musicBtn"
              title="背景音乐开关"
              aria-label="背景音乐开关"
              aria-pressed="true"
            >
              <svg class="leaderboard-link__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M9 18V5l10-2v13"
                />
                <circle cx="6" cy="18" r="3" fill="none" stroke="currentColor" stroke-width="1.7" />
              </svg>
              <span>音乐</span>
            </button>
            <a class="leaderboard-link" href="leaderboard.html" title="本地排行榜（最快用时）">
              <svg class="leaderboard-link__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M12 3l2.4 5.5 6 .6-4.5 3.8 1.4 5.9L12 16.9 6.7 18.8l1.4-5.9L3.6 9.1l6-.6L12 3z"
                />
              </svg>
              <span>排行榜</span>
            </a>
            <a class="leaderboard-link" href="help.html" title="操作说明">
              <svg class="leaderboard-link__icon" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M7 4h11a1 1 0 011 1v12l-3-2-3 2-3-2-3 2V5a1 1 0 011-1z"
                />
                <path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" d="M9 8h6M9 11h4" />
              </svg>
              <span>说明</span>
            </a>
          </div>
        </div>

        <div class="toolbar-row toolbar-row--status">
          <div class="hud-pill">
            <span class="hud-pill__label">雷</span>
            <div class="lcd" id="mine-count" aria-live="polite" title="剩余雷数">000</div>
          </div>

          <button type="button" class="face-btn face-btn--smile" id="face-btn" aria-label="重新开始" title="重新开始">
            <span class="face-btn__ring"></span>
            <svg class="face-svg" id="face-icon" viewBox="0 0 48 48" width="40" height="40" aria-hidden="true">
              <defs>
                <linearGradient id="faceSkin" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stop-color="#ffe08a" />
                  <stop offset="100%" stop-color="#f5b73a" />
                </linearGradient>
              </defs>
              <circle cx="24" cy="24" r="20" fill="url(#faceSkin)" stroke="#c9952d" stroke-width="1.5" />

              <g class="face-state face-state--smile">
                <circle cx="17" cy="20" r="2.2" fill="#2a2118" />
                <circle cx="31" cy="20" r="2.2" fill="#2a2118" />
                <path fill="none" stroke="#5c3d18" stroke-width="2" stroke-linecap="round" d="M16 29c2.5 3.5 13.5 3.5 16 0" />
              </g>
              <g class="face-state face-state--worried">
                <ellipse cx="17" cy="20" rx="2" ry="2.5" fill="#2a2118" />
                <ellipse cx="31" cy="20" rx="2" ry="2.5" fill="#2a2118" />
                <path fill="none" stroke="#5c3d18" stroke-width="2" stroke-linecap="round" d="M18 31h12" />
              </g>
              <g class="face-state face-state--dead">
                <path stroke="#2a2118" stroke-width="2.2" stroke-linecap="round" d="M14 17l6 6m0-6l-6 6M28 17l6 6m0-6l-6 6" />
                <path fill="none" stroke="#5c3d18" stroke-width="2" stroke-linecap="round" d="M17 33h14" />
              </g>
              <g class="face-state face-state--win">
                <rect x="12" y="17" width="24" height="8" rx="2" fill="#1e3a5f" stroke="#0d1f33" stroke-width="1" />
                <rect x="14" y="19" width="20" height="3" rx="0.5" fill="#3d6a9c" opacity="0.5" />
                <path fill="none" stroke="#5c3d18" stroke-width="2" stroke-linecap="round" d="M15 31c3 3 15 3 18 0" />
              </g>
            </svg>
          </button>

          <div class="hud-pill">
            <span class="hud-pill__label">计时</span>
            <div class="lcd" id="timer" aria-live="polite" title="用时">000</div>
          </div>
        </div>
      </header>

      <main class="board-wrap">
        <div class="board-outer" id="board-outer">
          <div id="board" class="board" role="grid" aria-label="雷区"></div>
        </div>
      </main>

      <nav class="mobile-controls" id="mobile-controls" aria-label="操作模式">
        <button type="button" class="mode-btn mode-btn--active" id="mode-reveal" data-mode="reveal" title="点格翻开">
          <svg class="mode-btn__icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 5c-5 0-9 4-9 7s4 7 9 7 9-4 9-7-4-7-9-7z"
            />
            <circle cx="12" cy="12" r="2.8" fill="currentColor" />
          </svg>
          <span class="mode-btn__label">翻开</span>
        </button>
        <button type="button" class="mode-btn" id="mode-flag" data-mode="flag" title="点格标记">
          <svg class="mode-btn__icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <path fill="currentColor" d="M5 4v17h2V4H5zm2 0l12 5-12 5V4z" />
            <path fill="none" stroke="currentColor" stroke-width="1.2" d="M5 21h3" stroke-linecap="round" />
          </svg>
          <span class="mode-btn__label">标记</span>
        </button>
        <button type="button" class="mode-btn" id="mode-chord" data-mode="chord" title="点已翻数字格：周围旗够数则展开">
          <svg class="mode-btn__icon" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              d="M12 5v3M12 16v3M5 12h3M16 12h3M18.2 5.8l-2.2 2.2M8 15l-2.2 2.2M18.2 18.2l-2.2-2.2M8 9L5.8 6.8"
            />
            <circle cx="12" cy="12" r="2.2" fill="currentColor" opacity="0.35" />
          </svg>
          <span class="mode-btn__label">展开</span>
        </button>
      </nav>

      <footer class="app-footer">
        <p class="author-info">Gerry | v1.0</p>
      </footer>
    </div>
    <script src="game.js"></script>
  </body>
</html>
